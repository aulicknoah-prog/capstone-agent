version: '3.8'

services:
  n8n:
    image: n8nio/n8n
    container_name: capstone-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - GENERIC_TIMEZONE=America/New_York
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - agent-network
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: capstone-redis
    volumes:
      - redis_data:/data
    networks:
      - agent-network
    restart: unless-stopped

networks:
  agent-network:
    driver: bridge

volumes:
  n8n_data:
  redis_data:
